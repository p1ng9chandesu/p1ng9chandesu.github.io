{% include calculate_relative_base.html %}
{% include escape-404.html %}

<header class="main-header">
  <div class="wrapper">
    <div class="header-flex">
      <div class="menu-icon-container">
        <span class="menu-icon"><i class="fa fa-bars" aria-hidden="true"></i></span>
      </div>
      <nav class="main-nav">
        <span class="menu-icon-close"><i class="fa fa-times" aria-hidden="true"></i></span>
        <ul>
          <li>
            {% include theme-toggle.html %}
          </li>
          <li>
            <a href="{{ relativebase }}">
              <div class="left">
                Home
              </div>  
              <div class="right">
                <i class="fa fa-home" aria-hidden="true" style="font-size: 24px; width: 24px; text-align: center;"></i>
              </div>
            </a>
          </li>
          <li>
            <a href="{{ relativebase }}archive">
              <div class="left">
                All Posts
              </div>
              <div class="right">
                <i class="fa fa-clock-o" aria-hidden="true" style="font-size: 24px; width: 24px; text-align: center;"></i>
              </div>
            </a>
          </li>
          <li>
            <a href="{{ relativebase }}tags">
              <div class="left">
                Tags
              </div>
              <div class="right">
                <i class="fa fa-tags" aria-hidden="true" style="font-size: 24px; width: 24px; text-align: center;"></i>
              </div>
            </a>
          </li>
          <li>
            <a href="{{ relativebase }}about">
              <div class="left">
                About
              </div>
              <div class="right">
                <i class="fa fa-user" aria-hidden="true" style="font-size: 24px; width: 24px; text-align: center;"></i>
              </div>
            </a>
          </li>
          <li>
            <a href="{{ relativebase }}feed.xml">
              <div class="left">
                Atom feed
              </div>
              <div class="right">
                <i class="fa fa-rss" aria-hidden="true" style="font-size: 24px; width: 24px; text-align: center;"></i>
              </div>
            </a>
          </li>
        </ul>
      </nav>
      {% capture logo_url %}{{ relativebase }}{{ site.logo  }}{% endcapture %}
      {% assign logo_url = logo_url | replace: "//", "/" %}
      <div class="logo"><a href="{{ relativebase }}"><img class="logo" id="logo" src="{{ logo_url }}" alt="{{ site.title }}"></a></div>
      <div class="search-icon-container">
        <span class="search-icon"><a><i class="fa fa-search" aria-hidden="true"></i></a></span>
      </div>
    </div>
  </div>
</header> <!-- End Header -->
